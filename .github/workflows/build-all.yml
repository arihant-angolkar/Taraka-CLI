# This workflow builds the standalone binaries for all supported platforms.
# It runs on every push of a tag and can be triggered manually.
name: Build All

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install --frozen-lockfile

      - name: Build macOS (arm64)
        run: |
          bun run build:mac

      - name: Build macOS (x64)
        run: |
          bun run build:mac-x64

      - name: Upload macOS binaries
        uses: actions/upload-artifact@v4
        with:
          name: border-code-macos
          path: dist/*

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install --frozen-lockfile

      - name: Build Linux (x64)
        run: |
          bun run build:linux

      - name: Build Linux (arm64)
        run: |
          bun run build:linux-arm

      - name: Upload Linux binaries
        uses: actions/upload-artifact@v4
        with:
          name: border-code-linux
          path: dist/*

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install --frozen-lockfile

      - name: Build Windows (x64)
        run: |
          bun run build:windows

      - name: Upload Windows binaries
        uses: actions/upload-artifact@v4
        with:
          name: border-code-windows
          path: dist/*

  release:
    runs-on: ubuntu-latest
    needs: [build-mac, build-linux, build-windows]
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: border-code-macos
          path: artifacts

      - uses: actions/download-artifact@v4
        with:
          name: border-code-linux
          path: artifacts

      - uses: actions/download-artifact@v4
        with:
          name: border-code-windows
          path: artifacts

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            artifacts/* \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes
